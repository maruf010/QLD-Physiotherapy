<section class="conditions-section section-padding" id="conditions">
  <div class="conditions-container">
    <h2 class="conditions-title">Conditions We Support</h2>
    <div class="title-underline"></div>

    <div class="conditions-grid">
      @for (cond of conditions; track cond.name) {
        <div class="condition-card">
          <div class="condition-icon-box">
            <img [src]="cond.image" [alt]="cond.name" class="condition-img" />
          </div>
          <h3 class="condition-name">{{ cond.name }}</h3>
        </div>
      }
    </div>
  </div>
</section>
