<nav class="navbar" [class.scrolled]="isScrolled()" [class.menu-open]="isMenuOpen()">
  <div class="navbar-container">
    <!-- Logo -->
    <a class="navbar-logo" routerLink="/">
      <img src="/assets/images/logo.png" alt="Queensland Exercise Physiology Logo" class="logo-img" />
    </a>

    <!-- Desktop Links -->
    <div class="navbar-links">
      @for (link of navLinks; track link.route) {
        <a class="nav-link" [routerLink]="link.route" routerLinkActive="active" [routerLinkActiveOptions]="{exact: link.route === '/'}">
          {{ link.label }}
        </a>
      }
    </div>

    <!-- Desktop CTA -->
    <div class="navbar-actions">
      <app-button variant="primary" routerLink="/contact" ariaLabel="Book Assessment">
        Book Assessment
      </app-button>
    </div>

    <!-- Hamburger Icon -->
    <button class="hamburger" (click)="toggleMenu()" [attr.aria-expanded]="isMenuOpen()" aria-label="Toggle navigation menu">
      <span class="bar bar-1"></span>
      <span class="bar bar-2"></span>
      <span class="bar bar-3"></span>
    </button>
  </div>

  <!-- Mobile Side Drawer -->
  <div class="mobile-drawer" [class.open]="isMenuOpen()">
    <div class="drawer-container">
      
      <div class="mobile-drawer-links">
        @for (link of navLinks; track link.route) {
          <a class="mobile-nav-link" [routerLink]="link.route" routerLinkActive="active" [routerLinkActiveOptions]="{exact: link.route === '/'}">
            <span class="link-num">0{{ $index + 1 }}.</span>
            <span class="link-text">{{ link.label }}</span>
          </a>
        }
        <div class="drawer-action">
          <app-button variant="primary" routerLink="/contact" customClass="w-full" ariaLabel="Book Assessment">
            Book Assessment
          </app-button>
        </div>
      </div>
    </div>
  </div>
</nav>
